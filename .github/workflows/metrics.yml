name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: binarywang
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai
          filename: github-metrics.svg
