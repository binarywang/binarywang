name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: binarywang
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update generated svg"

      - name: Refresh generated SVG
        run: git pull --ff-only

      - name: Localize SVG text nodes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("github-metrics.svg")
          if not path.exists():
              raise FileNotFoundError("Generated SVG was not committed to the workspace")

          rules = [
              (r'\bJoined GitHub\s+(\d+)\s+years?\s+ago\b', r'加入 GitHub \1 年前'),
              (r'\bJoined GitHub\s+(\d+)\s+months?\s+ago\b', r'加入 GitHub \1 个月前'),
              (r'\bJoined GitHub\s+(\d+)\s+days?\s+ago\b', r'加入 GitHub \1 天前'),
              (r'\bFollowed by\s+(\d+)\s+users\b', r'被 \1 位用户关注'),
              (r'\bContributed to\s+(\d+)\s+repositories\b', r'贡献了 \1 个仓库'),
              (r'\b(\d+)\s+Commits\b', r'\1 次提交'),
              (r'\b(\d+)\s+pull requests reviewed\b', r'\1 个拉取请求已审查'),
              (r'\b(\d+)\s+pull requests opened\b', r'\1 个拉取请求已创建'),
              (r'\b(\d+)\s+issues opened\b', r'\1 个议题已开启'),
              (r'\b(\d+)\s+issue comments\b', r'\1 条议题评论'),
              (r'\bMember of\s+(\d+)\s+organizations?\b', r'\1 个组织成员'),
              (r'\bFollowing\s+(\d+)\s+users\b', r'正在关注 \1 位用户'),
              (r'\bSponsoring\s+(\d+)\s+repositories\b', r'赞助 \1 个仓库'),
              (r'\bStarred\s+(\d+)\s+repositories\b', r'已加星 \1 个仓库'),
              (r'\bWatching\s+(\d+)\s+repositories\b', r'正在关注 \1 个仓库'),
              (r'\b(\d+)\s+(?:Repository|Repositories)\b', r'\1 个仓库'),
              (r'\b(\d+)\s+Releases?\b', r'\1 个发布版本'),
              (r'\b(\d+)\s+Packages?\b', r'\1 个软件包'),
              (r'\b(\d+)\s+Stargazers?\b', r'\1 个星标'),
              (r'\b(\d+)\s+Forkers?\b', r'\1 个分叉'),
              (r'\b(\d+)\s+Watchers?\b', r'\1 位关注者'),
              (r'\b(\d+(?:\.\d+)?\s*[kMGT]?B)\s+used\b', r'\1 已使用'),
              (r'\b(\d+)\s+Sponsors?\b', r'\1 位赞助者'),
              (r'\bNo license preference\b', '无许可证偏好'),
              (r'\bCommunity stats\b', '社区统计'),
              (r'\bActivity\b', '活跃度'),
              (r'\bCommunity\b', '社区'),
              (r'\bRepositories\b', '仓库'),
          ]

          def localize_text_nodes(svg):
              chunks = []
              position = 0
              in_style = False
              for match in re.finditer(r'<[^>]*>', svg):
                  text = svg[position:match.start()]
                  if not in_style:
                      for pattern, replacement in rules:
                          text = re.sub(pattern, replacement, text, flags=re.IGNORECASE)
                  chunks.extend((text, match.group(0)))

                  tag = match.group(0)
                  if re.match(r'<style(?:\s|>)', tag):
                      in_style = True
                  elif re.match(r'</style\s*>', tag):
                      in_style = False
                  position = match.end()

              text = svg[position:]
              if not in_style:
                  for pattern, replacement in rules:
                      text = re.sub(pattern, replacement, text, flags=re.IGNORECASE)
              chunks.append(text)
              return ''.join(chunks)

          svg = path.read_text(encoding="utf-8")
          localized = localize_text_nodes(svg)
          path.write_text(localized, encoding="utf-8")
          print(f"Localized text nodes in {path}")

          root_target = Path("github-metrics.svg")
          if path.resolve() != root_target.resolve():
              root_target.write_text(localized, encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          git config user.name "binary wang"
          git config user.email "a@binarywang.com"
          git add github-metrics.svg
          SVG_VERSION="$(git hash-object github-metrics.svg)"
          SVG_VERSION="$SVG_VERSION" python - <<'PY'
          from pathlib import Path
          import os
          import re

          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8")
          pattern = r'!\[Metrics\]\(\./github-metrics\.svg(?:\?v=[0-9a-f]{40})?\)'
          content, count = re.subn(
              pattern,
              f'![Metrics](./github-metrics.svg?v={os.environ["SVG_VERSION"]})',
              content,
          )
          if count != 1:
              raise RuntimeError(f"Expected one Metrics image reference, found {count}")
          readme.write_text(content, encoding="utf-8")
          PY
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(metrics): update localized svg"
            git push
          fi
