name: Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: binarywang
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai
          config_language: zh
          config_locale: zh-CN
          filename: github-metrics.svg
          output_action: none

      - name: Localize svg text fallback
        run: |
          python - <<'PY'
          from pathlib import Path

          candidates = [
              Path("github-metrics.svg"),
              Path("metrics_renders/github-metrics.svg"),
              Path("/metrics_renders/github-metrics.svg"),
          ]

          p = next((x for x in candidates if x.exists()), None)
          if p is None:
              print("SVG not found in expected paths, skip fallback localization")
              raise SystemExit(0)

          s = p.read_text(encoding="utf-8")
          mapping = {
              "Introduction": "简介",
              "Activity": "活跃度",
              "Community": "社区",
              "Repositories": "仓库",
              "Followers": "关注者",
              "Stars": "星标",
              "Pull requests": "拉取请求",
              "Issues": "议题",
          }

          replaced = 0
          for en, zh in mapping.items():
              n = s.count(en)
              if n:
                  replaced += n
                  s = s.replace(en, zh)

          p.write_text(s, encoding="utf-8")
          print(f"Localized: {p}, replacements: {replaced}")

          # ensure final file path is repository root for commit
          root_target = Path("github-metrics.svg")
          if p.resolve() != root_target.resolve():
              root_target.write_text(s, encoding="utf-8")
              print("Copied localized SVG to ./github-metrics.svg")
          PY

      - name: Commit and push
        run: |
          git config user.name "binary wang"
          git config user.email "a@binarywang.com"
          git add github-metrics.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(metrics): update localized svg"
            git push
          fi
